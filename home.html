<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link rel="stylesheet" href="home-style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar shadow">
        <div class="top-bar flex">
            <div class="flex topbar-left">
                <img src="img/github-logo.png" alt="">
                <h2 class="logo-title">GitHub Issues Tracker</h2>
            </div>
            <div class="topbar-right">
                <input class="search-box" type="text" placeholder="Search issues...">

                <button class="nav-btn"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>

        </div>
    </nav>

    <main>
        <section>
            <div class="three-btn">
                <button class="btn btn-primary">All</button>
                <button class="btn">Open</button>
                <button class="btn">Closed</button>
            </div>

        </section>

        <section class="counting">
            <div class="flex counting-section">
                <div class="flex">
                    <div class="img-div">

                        <img src="img/Aperture.png" alt="">
                    </div>
                    <div>
                    <h2 class="counting-title">50 Issues</h2>
                    <p class="counting-para">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex">
                    <div class="flex open-div">
                        <div class="green-dot"></div>
                        <p class="dot-para">Open</p>
                    </div>
                    <div class="flex open-div">
                        <div class="purple-dot"></div>
                        <p class="dot-para">Closed</p>
                    </div>
                </div>

            </div>

        </section>

    </main>

    
    

    <script src="home-api.js"></script>
</body>
</html>
