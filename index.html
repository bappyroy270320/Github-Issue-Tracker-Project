<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- daisy & tailwind -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> -->

    <!-- icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- css -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="container">
        <div class="form-card">
            <div class="form-logo"><img src="img/github-logo.png" alt=""></div>
            <h2 class="form-title">GitHub Issues Tracker</h2>
            <p class="form-subtitle">Sign in to manage your issues</p>

            <label for="text">Username</label>
            <input type="text" placeholder="Enter Username">
            <p class="user-credentials">Default: admin</p>

            <label for="password">Password</label>
            <input type="password" placeholder="Enter Password">
            <p class="user-credentials">Default: admin123</p>

            <button class="sign-btn">Sign In</button>

            <div class="or"><hr><span>OR</span><hr></div>
            <div><p class="credential-title">Demo Credentials:</p></div>
            <div class="credential-card">               
                <p class="para"><b>Username:</b> admin</p>
                <p class="para"><b>Password:</b> admin123</p>
            </div>



        </div>
        
        
    </section>

    <script src="script.js"></script>
</body>

</html>
